<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Proposal 😄</title>

	<style>
		body{
			margin:0;
			height:100vh;
			display:flex;
			justify-content:center;
			align-items:center;
			background: linear-gradient(135deg, #ff9a9e, #fad0c4);
			font-family: Arial, sans-serif;
			text-align:center;
		}

		.container{
			width:90%;
			max-width:350px;
			background:white;
			padding:25px;
			border-radius:15px;
			box-shadow:0 8px 25px rgba(0,0,0,0.2);
		}

		h1{
			font-size:20px;
			margin-bottom:20px;
		}

		button{
			padding:12px 18px;
			margin:10px;
			border:none;
			border-radius:10px;
			font-size:16px;
			cursor:pointer;
		}

		#yes{
			background:#4CAF50;
			color:white;
		}

		#no{
			background:#f44336;
			color:white;
			position:absolute;
		}
	</style>
</head>

<body>

<div class="container">
	<h1>Do you want to marry me? 💍</h1>

	<button id="yes" onclick="yesClick()">Yes ❤️</button>
	<button id="no" onmouseover="runAway()" ontouchstart="runAway()">No 😢</button>
</div>

<script>
	let noBtn = document.getElementById("no");

	function yesClick(){
		document.body.innerHTML = "<h1>Yay! ❤️ You made me happy 😍</h1>";
	}

	function runAway(){
		let maxX = window.innerWidth - noBtn.offsetWidth - 20;
		let maxY = window.innerHeight - noBtn.offsetHeight - 20;

		let x = Math.random() * maxX;
		let y = Math.random() * maxY;

		noBtn.style.left = x + "px";
		noBtn.style.top = y + "px";
	}
</script>

</body>
</html>
